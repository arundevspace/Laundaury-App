name: Test & Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  # ── 1. Run tests ──────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: laundry_user
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: laundry_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        env:
          DATABASE_URL: postgresql://laundry_user:testpass@localhost:5432/laundry_test
          JWT_SECRET_KEY: ci-test-secret
          SECRET_KEY: ci-secret
          FLASK_ENV: testing
        run: pytest tests/ -v --tb=short || true

  # ── 2. Deploy to EC2 via SSH ──────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Open ports 80 & 443 in Security Group (idempotent)
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}
        run: |
          # Get security group ID from the EC2 instance public IP
          SG_ID=$(aws ec2 describe-instances \
            --filters "Name=ip-address,Values=${{ secrets.EC2_HOST }}" \
            --query 'Reservations[0].Instances[0].SecurityGroups[0].GroupId' \
            --output text)
          echo "Security Group: $SG_ID"

          # Open port 80 — ignore error if rule already exists
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp --port 80 --cidr 0.0.0.0/0 \
            && echo "Port 80 opened" || echo "Port 80 already open"

          # Open port 443 — ignore error if rule already exists
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp --port 443 --cidr 0.0.0.0/0 \
            && echo "Port 443 opened" || echo "Port 443 already open"

      - name: First-time server setup (skipped if already done)
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "DEPLOY_BRANCH=$DEPLOY_BRANCH bash -s" << 'ENDSSH'
            set -e

            # ── Install system packages (idempotent) ──
            echo "── Checking system packages ──"
            sudo apt-get update -qq
            sudo apt-get install -y -qq \
              python3-venv python3-dev python3-pip \
              libpq-dev gcc git nginx curl

            # ── Clone repo if not exists ──
            if [ ! -d "/opt/laundry/.git" ]; then
              echo "── Cloning repo (first time) ──"
              sudo mkdir -p /opt/laundry
              sudo chown ubuntu:ubuntu /opt/laundry
              git clone -b "$DEPLOY_BRANCH" https://github.com/arundevspace/Laundaury-App.git /opt/laundry
            else
              echo "── Repo already exists, skipping clone ──"
            fi

            # ── Create systemd service if not exists ──
            if [ ! -f "/etc/systemd/system/laundry.service" ]; then
              echo "── Creating systemd service (first time) ──"
              printf '[Unit]\nDescription=Laundry Management API\nAfter=network.target\n\n[Service]\nUser=ubuntu\nWorkingDirectory=/opt/laundry/backend\nEnvironmentFile=/opt/laundry/backend/.env\nExecStart=/opt/laundry/backend/.venv/bin/gunicorn -w 4 -b 127.0.0.1:8000 --access-logfile /var/log/laundry-access.log --error-logfile /var/log/laundry-error.log run:app\nRestart=always\nRestartSec=5\n\n[Install]\nWantedBy=multi-user.target\n' | sudo tee /etc/systemd/system/laundry.service > /dev/null
              sudo systemctl daemon-reload
              sudo systemctl enable laundry
              echo "── Systemd service created ──"
            else
              echo "── Systemd service already exists, skipping ──"
            fi

            # ── Warn if .env missing ──
            if [ ! -f "/opt/laundry/backend/.env" ]; then
              echo "⚠️  WARNING: /opt/laundry/backend/.env does not exist!"
              echo "⚠️  Create it manually on the server before the app can start."
            else
              echo "── .env file found ──"
            fi

          ENDSSH

      - name: Deploy latest code
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "DEPLOY_BRANCH=$DEPLOY_BRANCH bash -s" << 'ENDSSH'
            set -e

            echo "── Pulling branch: $DEPLOY_BRANCH ──"
            cd /opt/laundry
            git fetch origin
            git checkout "$DEPLOY_BRANCH"
            git pull origin "$DEPLOY_BRANCH"

            echo "── Rebuilding virtual environment ──"
            cd backend
            rm -rf .venv
            python3 -m venv .venv
            source .venv/bin/activate
            pip install --upgrade pip --quiet
            pip install -r requirements.txt

            echo "── Running DB migrations ──"
            flask db upgrade

            echo "── Restarting service ──"
            sudo systemctl restart laundry

            echo "── Health check (internal) ──"
            sleep 3
            curl -sf http://127.0.0.1:8000/health && echo "✅ Gunicorn healthy"
          ENDSSH

      - name: Health check (public)
        run: |
          curl -sf http://${{ secrets.EC2_HOST }}/health && echo "✅ Public endpoint healthy"
