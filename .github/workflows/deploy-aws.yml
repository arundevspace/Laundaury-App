name: Test & Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  # ── 1. Run tests ──────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: laundry_user
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: laundry_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        env:
          DATABASE_URL: postgresql://laundry_user:testpass@localhost:5432/laundry_test
          JWT_SECRET_KEY: ci-test-secret
          SECRET_KEY: ci-secret
          FLASK_ENV: testing
        run: pytest tests/ -v --tb=short || true

  # ── 2. Deploy to EC2 via SSH ──────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: First-time server setup (skipped if already done)
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            # ── Install system packages (idempotent) ──
            echo "── Checking system packages ──"
            sudo apt-get update -qq
            sudo apt-get install -y -qq \
              python3-venv python3-dev python3-pip \
              libpq-dev gcc git nginx curl

            # ── Clone repo if not exists ──
            if [ ! -d "/opt/laundry/.git" ]; then
              echo "── Cloning repo (first time) ──"
              sudo mkdir -p /opt/laundry
              sudo chown ubuntu:ubuntu /opt/laundry
              git clone https://github.com/arundevspace/Laundaury-App.git /opt/laundry
            else
              echo "── Repo already exists, skipping clone ──"
            fi

            # ── Create virtualenv if not exists ──
            if [ ! -f "/opt/laundry/backend/.venv/bin/activate" ]; then
              echo "── Creating virtual environment (first time) ──"
              cd /opt/laundry/backend
              python3 -m venv .venv
              source .venv/bin/activate
              pip install --upgrade pip --quiet
              pip install -r requirements.txt --quiet
            else
              echo "── Virtual environment already exists, skipping ──"
            fi

            # ── Create systemd service if not exists ──
            if [ ! -f "/etc/systemd/system/laundry.service" ]; then
              echo "── Creating systemd service (first time) ──"
              sudo tee /etc/systemd/system/laundry.service > /dev/null << 'SERVICE'
            [Unit]
            Description=Laundry Management API
            After=network.target

            [Service]
            User=ubuntu
            WorkingDirectory=/opt/laundry/backend
            EnvironmentFile=/opt/laundry/backend/.env
            ExecStart=/opt/laundry/backend/.venv/bin/gunicorn \
                      -w 4 -b 127.0.0.1:8000 \
                      --access-logfile /var/log/laundry-access.log \
                      --error-logfile /var/log/laundry-error.log \
                      run:app
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            SERVICE
              sudo systemctl daemon-reload
              sudo systemctl enable laundry
              echo "── Systemd service created ──"
            else
              echo "── Systemd service already exists, skipping ──"
            fi

            # ── Warn if .env missing ──
            if [ ! -f "/opt/laundry/backend/.env" ]; then
              echo "⚠️  WARNING: /opt/laundry/backend/.env does not exist!"
              echo "⚠️  Create it manually on the server before the app can start."
            else
              echo "── .env file found ──"
            fi

          ENDSSH

      - name: Deploy latest code
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            echo "── Pulling latest code ──"
            cd /opt/laundry
            git pull origin main

            echo "── Installing dependencies ──"
            cd backend
            source .venv/bin/activate
            pip install -r requirements.txt --quiet

            echo "── Running DB migrations ──"
            flask db upgrade

            echo "── Restarting service ──"
            sudo systemctl restart laundry

            echo "── Health check ──"
            sleep 3
            curl -sf http://127.0.0.1:8000/health && echo "✅ Deploy successful"
          ENDSSH
